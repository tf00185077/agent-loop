services:

  # ── 主服務：跑 agent ──────────────────────────────────────────────────────
  auto-agent:
    build:
      context: .
      target: runtime
    image: auto-agent:local
    container_name: auto-agent

    # TTY + stdin 開啟，引導式 login prompt 才能運作
    tty: true
    stdin_open: true

    environment:
      # 優先從 .env 或 host env 注入 token；有了就跳過引導
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GH_TOKEN=${GH_TOKEN:-}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}
      # 讓 login.ts 知道現在在容器內（無法開瀏覽器）
      - RUNNING_IN_DOCKER=true

    volumes:
      # 把 host 專案目錄掛進去當 workspace（agent 讀寫檔案用）
      - .:/workspace

    # gh auth 登入狀態放在 named volume，重啟容器不會掉
    # （gh 預設存在 ~/.config/gh/）
      - gh-config:/root/.config/gh

    # Copilot SDK 的 session state / cache
      - copilot-home:/root/.copilot

    command: ["node", "/app/dist/index.js"]

  # ── 登入工具：只跑 gh auth login 後結束 ──────────────────────────────────
  login:
    build:
      context: .
      target: runtime
    image: auto-agent:local
    container_name: auto-agent-login

    tty: true
    stdin_open: true

    environment:
      - RUNNING_IN_DOCKER=true

    volumes:
      - gh-config:/root/.config/gh
      - copilot-home:/root/.copilot

    # gh device flow 不需要瀏覽器，照著指示在 github.com/login/device 輸入 code
    entrypoint: ["gh", "auth", "login", "--hostname", "github.com", "--git-protocol", "https"]
    command: []

volumes:
  gh-config:
  copilot-home:

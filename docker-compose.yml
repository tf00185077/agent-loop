services:

  # ── Dashboard server（開發模式，hot reload）────────────────────────────────
  server:
    build:
      context: .
      target: runtime
    image: auto-agent:local
    container_name: auto-agent-server

    tty: true
    stdin_open: true

    ports:
      - "3000:3000"

    environment:
      - RUNNING_IN_DOCKER=true
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GH_TOKEN=${GH_TOKEN:-}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}

    volumes:
      # source code 掛進來，tsx watch 偵測變更自動 reload
      - ./src:/app/src
      - ./dashboard:/app/dashboard
      # node_modules 用容器內的，不混用 Windows 版
      - /app/node_modules
      # gh 登入狀態 & copilot session 持久化
      - gh-config:/root/.config/gh
      - copilot-home:/root/.copilot

    working_dir: /app

    command: ["npx", "tsx", "watch", "src/server/index.ts"]

  # ── 登入工具：跑一次 gh device flow 後結束 ────────────────────────────────
  login:
    build:
      context: .
      target: runtime
    image: auto-agent:local
    container_name: auto-agent-login

    tty: true
    stdin_open: true

    environment:
      - RUNNING_IN_DOCKER=true

    volumes:
      - gh-config:/root/.config/gh
      - copilot-home:/root/.copilot

    entrypoint: ["gh", "auth", "login", "--hostname", "github.com", "--git-protocol", "https"]
    command: []

  # ── CLI agent（terminal 直接用）────────────────────────────────────────────
  agent:
    build:
      context: .
      target: runtime
    image: auto-agent:local
    container_name: auto-agent

    tty: true
    stdin_open: true

    environment:
      - RUNNING_IN_DOCKER=true
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GH_TOKEN=${GH_TOKEN:-}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:-}

    volumes:
      - .:/workspace
      - /app/node_modules
      - gh-config:/root/.config/gh
      - copilot-home:/root/.copilot

    working_dir: /workspace
    command: ["node", "/app/dist/index.js"]

volumes:
  gh-config:
  copilot-home:
